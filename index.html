    <script>
      // Provide global for libraries that expect it
      window.global = window;
      
      // Prevent libraries from crashing when trying to set fetch on window/global
      // which is read-only in some environments (like AI Studio preview iframe)
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: (v) => { 
            console.warn('Attempted to overwrite window.fetch, ignored to prevent crash.');
          }
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch, hopefully aliases will catch it.');
      }
    </script>
